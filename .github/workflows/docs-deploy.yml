# SPDX-License-Identifier: MIT
#
# Build and deploy the mkdocs site to GitHub Pages on push to main.
#
# Separate from ci.yml because the deploy step needs `pages: write` and
# `id-token: write` permissions that should not be granted on every PR.
# ci.yml already runs `mkdocs build --strict` on every PR and main push as a
# build-correctness gate; this workflow re-builds and publishes the result.
#
# **One-time setup required by the maintainer:**
#   GitHub repo → Settings → Pages → Build and deployment → Source:
#   set to "GitHub Actions" (not "Deploy from a branch"). Once that is set,
#   the first run of this workflow on main publishes the site to
#   https://uwarring82.github.io/iontrap-structure/.

name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent deployment, but do not cancel an in-flight production
# deploy — let it finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build mkdocs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docs]"

      - name: mkdocs build --strict
        run: mkdocs build --strict

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages (as a GitHub Actions source) on first run if it isn't
          # already, so the deploy is self-sufficient and doesn't fail the way
          # the very first post-merge run did (Pages not yet enabled → "Get
          # Pages site failed"). No-op once Pages is configured.
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
